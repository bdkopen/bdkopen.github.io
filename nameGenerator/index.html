<!DOCTYPE html>
<html>
	<head>
		<link rel="stylesheet" type="text/css" href="../css/global.css">
		<link rel="stylesheet" type="text/css" href="style.css">
		<title>Custon Name Generator</title>
	</head>
	
	<body>
		<!--Set the div for the header bar. Import a js file that runs a specific script to set a universal header amongst all the pages.-->
		<div id="header-bar"><p>Hello! If you are reading this, you most likely have javascript disabled. Try reloading the page or enabling javascript.</p></div>
		<script src="../javascript/header-bar.js"></script>
		
		<!-- Title header -->
		<h2>Name Generator<hr></h2>
		
		<!-- Button that generates names for towns -->
		<button id="generateTownName">Generate Town Name</button>
		
		<!-- Box inwhich all custom names are generated -->
		<div id="output">
		<p>Click the button correlated to the name generator you need.</p></div>

		<!--All code used to run name generator-->
		<script src="code.js"></script>
	</body>
</html>
